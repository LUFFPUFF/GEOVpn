name: CD - Deploy to Production

on:
  push:
    branches: [ main ]
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: staging
      url: https://staging-api.geovpn.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.STAGING_SSH_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.STAGING_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to Staging
        run: |
          ssh ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} << 'ENDSSH'
            cd /opt/telegram-vpn
          
            # Backup current deployment
            ./infrastructure/ci-cd/scripts/backup.sh
          
            # Pull latest images
            docker-compose -f infrastructure/docker/docker-compose.prod.yml pull
          
            # Deploy with zero-downtime
            docker-compose -f infrastructure/docker/docker-compose.prod.yml up -d
          
            # Health check
            ./infrastructure/ci-cd/scripts/health-check.sh || {
              echo "Health check failed! Rolling back..."
              ./infrastructure/ci-cd/scripts/rollback.sh
              exit 1
            }
          ENDSSH

      - name: Run Smoke Tests
        run: |
          chmod +x infrastructure/ci-cd/scripts/smoke-tests.sh
          ./infrastructure/ci-cd/scripts/smoke-tests.sh ${{ secrets.STAGING_HOST }}

      - name: Notify Deployment
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            Deployed to Staging!
            
            Version: ${{ github.sha }}
            Environment: Staging
            URL: https://staging-api.geovpn.com

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
    environment:
      name: production
      url: https://api.geovpn.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.PRODUCTION_SSH_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.PRODUCTION_HOST }} >> ~/.ssh/known_hosts

      - name: Pre-deployment Notification
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            Starting Production Deployment...
            
            Version: ${{ github.ref_name }}
            Time: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
            
            Deployer: ${{ github.actor }}

      - name: Create Database Backup
        run: |
          ssh ${{ secrets.PRODUCTION_USER }}@${{ secrets.PRODUCTION_HOST }} << 'ENDSSH'
            cd /opt/telegram-vpn
            ./infrastructure/ci-cd/scripts/backup-database.sh
          ENDSSH

      - name: Deploy to Production
        run: |
          ssh ${{ secrets.PRODUCTION_USER }}@${{ secrets.PRODUCTION_HOST }} << 'ENDSSH'
            cd /opt/telegram-vpn
          
            # Pull latest code and images
            git pull origin main
            docker-compose -f infrastructure/docker/docker-compose.prod.yml pull
          
            # Rolling update with zero downtime
            ./infrastructure/ci-cd/scripts/deploy.sh
          
            # Health check
            ./infrastructure/ci-cd/scripts/health-check.sh || {
              echo "Health check failed! Initiating rollback..."
              ./infrastructure/ci-cd/scripts/rollback.sh
              exit 1
            }
          
            echo "Deployment successful!"
          ENDSSH

      - name: Run Production Smoke Tests
        run: |
          chmod +x infrastructure/ci-cd/scripts/smoke-tests.sh
          ./infrastructure/ci-cd/scripts/smoke-tests.sh ${{ secrets.PRODUCTION_HOST }}

      - name: Success Notification
        if: success()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            Production Deployment Successful!
            
            Version: ${{ github.ref_name }}
            Environment: Production
            URL: https://api.geovpn.com
            Time: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
            
            All services are healthy and running!

      - name: Failure Notification
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            Production Deployment FAILED!
            
            Version: ${{ github.ref_name }}
            Rollback initiated automatically.
            
            Check logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

  monitor:
    name: Post-Deployment Monitoring
    runs-on: ubuntu-latest
    needs: deploy-production
    if: success()

    steps:
      - name: Monitor for 5 minutes
        run: |
          echo "Monitoring production for 5 minutes..."
          for i in {1..10}; do
            echo "Check $i/10..."
            curl -f https://api.geovpn.com/actuator/health || exit 1
            sleep 30
          done
          echo "All checks passed!"

      - name: Alert if issues detected
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            POST-DEPLOYMENT ALERT!
            
            Production health checks are failing!
            Immediate attention required!