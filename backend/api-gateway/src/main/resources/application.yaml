server:
  port: 8080
  error:
    include-message: always

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      default-filters:
        - AuthenticationFilter
        - name: RequestRateLimiter
          args:
            redis-rate-limiter.replenishRate: 10
            redis-rate-limiter.burstCapacity: 20
            redis-rate-limiter.requestedTokens: 1
            key-resolver: "#{@userKeyResolver}"
        - name: Retry
          args:
            retries: 3
            statuses: BAD_GATEWAY,SERVICE_UNAVAILABLE
            methods: GET,POST
            backoff:
              firstBackoff: 50ms
              maxBackoff: 500ms
              factor: 2
              basedOnPreviousValue: false
        - name: CircuitBreaker
          args:
            name: defaultCircuitBreaker
            fallbackUri: forward:/fallback

      httpclient:
        connect-timeout: 5000
        response-timeout: 10s
        pool:
          type: ELASTIC
          max-idle-time: 15s
          max-life-time: 60s

      globalcors:
        cors-configurations:
          '[/**]':
            allowed-origins:
              - "${CORS_ALLOWED_ORIGINS:http://localhost:3000}"
            allowed-methods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
            allowed-headers: "*"
            exposed-headers:
              - X-Trace-Id
              - X-User-Id
            allow-credentials: true
            max-age: 3600

      routes:
        - id: user-service
          uri: ${USER_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/v1/users/**,/api/v1/devices/**
          filters:
            - StripPrefix=2

        - id: vpn-config-service
          uri: ${VPN_CONFIG_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/v1/configs/**
          filters:
            - StripPrefix=2

        - id: server-management-service
          uri: ${SERVER_MANAGEMENT_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/v1/servers/**
          filters:
            - StripPrefix=2

        - id: billing-service
          uri: ${BILLING_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/v1/billing/**,/api/v1/transactions/**
          filters:
            - StripPrefix=2

        - id: blocked-domains-service
          uri: ${BLOCKED_DOMAINS_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/api/v1/blocked-domains/**
          filters:
            - StripPrefix=2

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms

service:
  jwt:
    secret: ${JWT_SECRET:89ahwkjIOwZbP3dC4GwzDo7m5RzPUsYifSftbBu5fervCPjlWuP9gUddZkI1bvGYIQDwqu2r12D90Iu/HlY9JQ==}
    expiration: ${JWT_EXPIRATION:86400000}
    refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

  security:
    open-endpoints:
      - /api/v1/auth/login
      - /api/v1/auth/register
      - /api/v1/auth/telegram
      - /api/v1/auth/refresh
      - /api/v1/webhooks/yoomoney
      - /api/v1/webhooks/cryptopay
      - /actuator/health
      - /actuator/info
      - /fallback

    internal-secret: ${INTERNAL_SECRET:Internal_Secret_Vpn_App_2024_!@#}

resilience4j:
  circuitbreaker:
    instances:
      defaultCircuitBreaker:
        sliding-window-size: 10
        permitted-number-of-calls-in-half-open-state: 3
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        register-health-indicator: true

  timelimiter:
    instances:
      defaultCircuitBreaker:
        timeout-duration: 10s

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,gateway
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
    gateway:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  prometheus:
    metrics:
      export:
        enabled: true

logging:
  level:
    root: INFO
    com.vpn.gateway: DEBUG
    org.springframework.cloud.gateway: DEBUG
    reactor.netty: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"