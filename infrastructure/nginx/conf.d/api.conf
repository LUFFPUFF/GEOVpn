server {
    listen 80;
    listen [::]:80;
    server_name api.geovpn.com geovpn.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$server_name$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.geovpn.com geovpn.com;

    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_trusted_certificate /etc/nginx/certs/chain.pem;

    access_log /var/log/nginx/api_access.log detailed;
    error_log /var/log/nginx/api_error.log warn;

    add_header X-Request-ID $request_id always;
    add_header X-Trace-ID $request_id always;

    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    location ~ ^/api/v1/auth/(login|register) {
        limit_req zone=auth_limit burst=10 nodelay;
        limit_conn addr 5;

        proxy_pass http://api_gateway;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    location ~ ^/api/v1/webhooks/ {
        limit_except POST {
            deny all;
        }

        proxy_pass http://api_gateway;
        include /etc/nginx/conf.d/proxy_params.conf;

        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        limit_conn addr 10;

        proxy_pass http://api_gateway;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    location /actuator/ {
        allow 127.0.0.1;
        allow 172.20.0.0/16;
        deny all;

        proxy_pass http://api_gateway;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    location /metrics {
        allow 127.0.0.1;
        allow 172.20.0.0/16;
        deny all;

        proxy_pass http://api_gateway;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    location /grafana/ {
        proxy_pass http://grafana:3000/;
        include /etc/nginx/conf.d/proxy_params.conf;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;

    location = /50x.html {
        root /usr/share/nginx/html;
    }

    location = /404.html {
        root /usr/share/nginx/html;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name admin.geovpn.com;

    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    access_log /var/log/nginx/admin_access.log detailed;
    error_log /var/log/nginx/admin_error.log warn;

    location / {
        #todo Здесь будет admin panel frontend
        root /usr/share/nginx/html/admin;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        limit_req zone=api_limit burst=50 nodelay;
        proxy_pass http://api_gateway;
        include /etc/nginx/conf.d/proxy_params.conf;
    }
}
