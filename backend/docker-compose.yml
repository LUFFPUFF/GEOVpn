version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: vpn-postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: telegram_vpn
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - vpn-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U admin -d telegram_vpn" ]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: vpn-redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - vpn-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  vpn-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data: