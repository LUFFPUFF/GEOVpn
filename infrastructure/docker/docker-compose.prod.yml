version: '3.8'

networks:
  vpn-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

  monitoring-network:
    driver: bridge
    internal: false

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  nginx-certs:
    driver: local
  nginx-logs:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local


services:
  postgres:
    image: postgres:15-alpine
    container_name: telegram-vpn-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: ${PRODUCTION_DB_NAME}
      POSTGRES_USER: ${PRODUCTION_DB_USER}
      POSTGRES_PASSWORD: ${PRODUCTION_DB_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"

    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d:ro

    networks:
      - vpn-network

    ports:
      - "127.0.0.1:5432:5432"

    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${PRODUCTION_DB_USER} -d ${PRODUCTION_DB_NAME}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"


  redis:
    image: redis:7-alpine
    container_name: telegram-vpn-redis
    restart: unless-stopped

    command: >
      redis-server
      --requirepass ${PRODUCTION_REDIS_PASSWORD}
      --appendonly yes
      --appendfsync everysec
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru

    volumes:
      - redis-data:/data

    networks:
      - vpn-network

    ports:
      - "127.0.0.1:6379:6379"

    healthcheck:
      test: [ "CMD", "redis-cli", "--raw", "incr", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"


  api-gateway:
    build:
      context: ../../
      dockerfile: infrastructure/docker/Dockerfile.template
      args:
        SERVICE_NAME: api-gateway
        SERVER_PORT: ${GATEWAY_PORT}

    container_name: telegram-vpn-api-gateway
    restart: unless-stopped

    environment:
      SPRING_PROFILES_ACTIVE: prod

      GATEWAY_PORT: ${GATEWAY_PORT}

      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION}

      INTERNAL_SECRET: ${INTERNAL_SECRET}
      SECURITY_OPEN_ENDPOINTS: "/api/v1/auth/login,/api/v1/auth/register,/api/v1/auth/telegram,/api/v1/auth/refresh,/api/v1/webhooks/yoomoney,/api/v1/webhooks/cryptopay,/actuator/health,/actuator/info,/fallback"

      ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}

      REDIS_HOST: redis
      REDIS_PORT: ${PRODUCTION_REDIS_PORT}
      REDIS_PASSWORD: ${PRODUCTION_REDIS_PASSWORD}

      USER_SERVICE_URL: http://user-service:${USER_SERVICE_PORT}
      VPN_CONFIG_SERVICE_URL: http://vpn-config-service:${VPN_CONFIG_SERVICE_PORT}
      SERVER_MGM_SERVICE_URL: http://server-management-service:${SERVER_MANAGEMENT_SERVICE_PORT}
      BILLING_SERVICE_URL: http://billing-service:${BILLING_SERVICE_PORT}
      BLOCKED_DOMAINS_SERVICE_URL: http://blocked-domains-service:${BLOCKED_DOMAINS_SERVICE_PORT:-8085}

      ID_ROUTES_USER_SERVICE: user-service
      PATH_USER_SERVICE: /api/v1/users/**,/api/v1/devices/**

      ID_ROUTES_VPN_CONFIG_SERVICE: vpn-config-service
      PATH_VPN_CONFIG_SERVICE: /api/v1/configs/**

      ID_ROUTES_SERVER_MGM_SERVICE: server-management-service
      PATH_SERVER_MGM_SERVICE: /api/v1/servers/**

      ID_ROUTES_BILLING_SERVICE: billing-service
      PATH_BILLING_SERVICE: /api/v1/billing/**,/api/v1/transactions/**

      ID_ROUTES_BLOCKED_DOMAIN_SERVICE: blocked-domains-service
      PATH_BLOCKED_DOMAIN_SERVICE: /api/v1/blocked-domains/**

      MONITORING_ENDPOINTS: health,info,metrics,prometheus,gateway

      JAVA_OPTS: >
        -Xms256m
        -Xmx512m
        -XX:+UseG1GC
        -XX:MaxGCPauseMillis=200
        -XX:+UseContainerSupport
        -XX:MaxRAMPercentage=75.0

    depends_on:
      redis:
        condition: service_healthy
      user-service:
        condition: service_healthy
      vpn-config-service:
        condition: service_healthy
      server-management-service:
        condition: service_healthy

    networks:
      - vpn-network

    ports:
      - "127.0.0.1:${GATEWAY_PORT}:${GATEWAY_PORT}"

    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:${GATEWAY_PORT}/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 768M
        reservations:
          cpus: '0.25'
          memory: 256M

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  user-service:
    build:
      context: ../../
      dockerfile: infrastructure/docker/Dockerfile.template
      args:
        SERVICE_NAME: user-service
        SERVER_PORT: ${USER_SERVICE_PORT}

    container_name: telegram-vpn-user-service
    restart: unless-stopped

    environment:
      SPRING_PROFILES_ACTIVE: prod

      USER_SERVICE_PORT: ${USER_SERVICE_PORT}

      PRODUCTION_DB_HOST: postgres
      PRODUCTION_DB_PORT: ${PRODUCTION_DB_PORT}
      PRODUCTION_DB_NAME: ${PRODUCTION_DB_NAME}
      PRODUCTION_DB_USER: ${PRODUCTION_DB_USER}
      PRODUCTION_DB_PASSWORD: ${PRODUCTION_DB_PASSWORD}

      HIKARI_MAX_POOL: ${DB_MAX_CONNECTIONS:-20}
      HIKARI_MIN_IDLE: 2

      JPA_DDL_AUTO: validate
      SHOW_SQL: false

      FLYWAY_ENABLED: true

      REDIS_HOST: redis
      REDIS_PORT: ${PRODUCTION_REDIS_PORT}
      REDIS_PASSWORD: ${PRODUCTION_REDIS_PASSWORD}

      CACHE_TTL: 600000

      INTERNAL_SECRET: ${INTERNAL_SECRET}
      ADMIN_USER_IDS: ${ADMIN_USER_IDS}

      LOG_LEVEL: INFO
      VPN_LOG_LEVEL: DEBUG
      HIBERNATE_LOG_LEVEL: WARN

      MONITORING_ENDPOINTS: health,info,metrics,prometheus

      JAVA_OPTS: >
        -Xms256m
        -Xmx512m
        -XX:+UseG1GC
        -XX:MaxGCPauseMillis=200
        -XX:+UseContainerSupport
        -XX:MaxRAMPercentage=75.0

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

    networks:
      - vpn-network

    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:${USER_SERVICE_PORT}/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 768M
        reservations:
          cpus: '0.25'
          memory: 256M

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  vpn-config-service:
    build:
      context: ../../
      dockerfile: infrastructure/docker/Dockerfile.template
      args:
        SERVICE_NAME: vpn-config-service
        SERVER_PORT: ${VPN_CONFIG_SERVICE_PORT}

    container_name: telegram-vpn-config-service
    restart: unless-stopped

    environment:
      SPRING_PROFILES_ACTIVE: prod

      VPN_CONFIG_PORT: ${VPN_CONFIG_SERVICE_PORT}

      PRODUCTION_DB_HOST: postgres
      PRODUCTION_DB_PORT: ${PRODUCTION_DB_PORT}
      PRODUCTION_DB_NAME: ${PRODUCTION_DB_NAME}
      PRODUCTION_DB_USER: ${PRODUCTION_DB_USER}
      PRODUCTION_DB_PASSWORD: ${PRODUCTION_DB_PASSWORD}

      HIKARI_MAX_POOL: ${DB_MAX_CONNECTIONS:-20}

      JPA_DDL_AUTO: validate
      SHOW_SQL: false

      FLYWAY_ENABLED: true
      CLASS_PATH_MIGRATION: classpath:db/migration
      VALIDATE_MIGRATE: true

      PRODUCTION_REDIS_HOST: redis
      PRODUCTION_REDIS_PORT: ${PRODUCTION_REDIS_PORT}
      PRODUCTION_REDIS_PASSWORD: ${PRODUCTION_REDIS_PASSWORD}
      TIMEOUT_REDIS: 2000ms

      CACHE_TTL: 300000

      VLESS_SNI: www.google.com

      SERVER_MANAGEMENT_URL: http://server-management-service:${SERVER_MANAGEMENT_SERVICE_PORT}

      INTERNAL_SECRET: ${INTERNAL_SECRET}

      MOCK_ENABLED: false

      MONITORING_ENDPOINTS: health,info,metrics,prometheus

      JAVA_OPTS: >
        -Xms256m
        -Xmx512m
        -XX:+UseG1GC
        -XX:MaxGCPauseMillis=200
        -XX:+UseContainerSupport
        -XX:MaxRAMPercentage=75.0

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

    networks:
      - vpn-network

    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:${VPN_CONFIG_SERVICE_PORT}/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 768M
        reservations:
          cpus: '0.25'
          memory: 256M

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  server-management-service:
    build:
      context: ../../
      dockerfile: infrastructure/docker/Dockerfile.template
      args:
        SERVICE_NAME: server-management-service
        SERVER_PORT: ${SERVER_MANAGEMENT_SERVICE_PORT}

    container_name: telegram-vpn-server-management
    restart: unless-stopped

    environment:
      SPRING_PROFILES_ACTIVE: prod

      SERVER_MGM_PORT: ${SERVER_MANAGEMENT_SERVICE_PORT}

      PRODUCTION_DB_HOST: postgres
      PRODUCTION_DB_PORT: ${PRODUCTION_DB_PORT}
      PRODUCTION_DB_NAME: ${PRODUCTION_DB_NAME}
      PRODUCTION_DB_USER: ${PRODUCTION_DB_USER}
      PRODUCTION_DB_PASSWORD: ${PRODUCTION_DB_PASSWORD}

      JPA_DDL_AUTO: validate

      INTERNAL_SECRET: ${INTERNAL_SECRET}
      INTERNAL_CHECK_ENABLED: true
      ADMIN_USER_IDS: ${ADMIN_USER_IDS}

      VPN_HEALTH_CHECK_MS: ${SERVER_HEALTH_CHECK_INTERVAL:-60000}
      VPN_TIMEOUT_MS: 5000
      XRAY_GRPC_PORT: ${XRAY_GRPC_TIMEOUT:-10085}

      MONITORING_ENDPOINTS: health,info,metrics,prometheus

      JAVA_OPTS: >
        -Xms256m
        -Xmx512m
        -XX:+UseG1GC
        -XX:MaxGCPauseMillis=200
        -XX:+UseContainerSupport
        -XX:MaxRAMPercentage=75.0

    depends_on:
      postgres:
        condition: service_healthy

    networks:
      - vpn-network

    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:${SERVER_MANAGEMENT_SERVICE_PORT}/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 768M
        reservations:
          cpus: '0.25'
          memory: 256M

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  nginx:
    image: nginx:alpine
    container_name: telegram-vpn-nginx
    restart: unless-stopped

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - nginx-certs:/etc/nginx/certs:ro
      - nginx-logs:/var/log/nginx
      - ./nginx/html:/usr/share/nginx/html:ro

    networks:
      - vpn-network

    ports:
      - "80:80"
      - "443:443"

    depends_on:
      - api-gateway

    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  prometheus:
    image: prom/prometheus:latest
    container_name: telegram-vpn-prometheus
    restart: unless-stopped

    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'

    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus

    networks:
      - vpn-network
      - monitoring-network

    ports:
      - "127.0.0.1:9090:9090"

    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy" ]
      interval: 30s
      timeout: 10s
      retries: 3

    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M

  grafana:
    image: grafana/grafana:latest
    container_name: telegram-vpn-grafana
    restart: unless-stopped

    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_INSTALL_PLUGINS: grafana-piechart-panel
      GF_SERVER_ROOT_URL: https://${PRODUCTION_HOST}/grafana

    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro

    networks:
      - vpn-network
      - monitoring-network

    ports:
      - "127.0.0.1:3000:3000"

    depends_on:
      - prometheus

    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M


