server:
  port: 8084

spring:
  application:
    name: server-management-service
  datasource:
    url: jdbc:postgresql://localhost:5432/telegram_vpn
    username: admin
    password: admin
  jpa:
    hibernate:
      ddl-auto: validate
  quartz:
