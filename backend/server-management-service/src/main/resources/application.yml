    internal-secret: "Internal_Secret_Vpn_App_2024_!@#"
    internal-check-enabled: true
    admins:
      - 999999

vpn:
  monitoring:
    health-check-interval-ms: 30000
    timeout-ms: 5000
    xray-grpc-port: 10085