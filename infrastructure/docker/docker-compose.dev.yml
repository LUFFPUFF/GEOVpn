version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: vpn-postgres-dev
    environment:
      POSTGRES_DB: telegram_vpn
      POSTGRES_USER: vpn_user
      POSTGRES_PASSWORD: vpn_password
      TZ: Europe/Moscow
    ports:
      - "5432:5432"
    volumes:
      - postgres-data-dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vpn_user -d telegram_vpn"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: vpn-redis-dev
    ports:
      - "6379:6379"
    volumes:
      - redis-data-dev:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres-data-dev:
  redis-data-dev: