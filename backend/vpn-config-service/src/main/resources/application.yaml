server:
  port: 8083

spring:
  application:
    name: vpn-config-service

  datasource:
    url: jdbc:postgresql://localhost:5432/telegram_vpn
    username: admin
    password: admin
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: VpnConfigHikariCP

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    validate-on-migrate: true


  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms


  cache:
    type: redis
    redis:
      time-to-live: 300000


feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 10000
        loggerLevel: basic
      server-management-service:
        url: ${SERVER_MANAGEMENT_URL:http://localhost:8084}


resilience4j:
  circuitbreaker:
    instances:
      serverManagement:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true

  retry:
    instances:
      serverManagement:
        max-attempts: 3
        wait-duration: 1s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2


vpn:
  config:
    vless:
      default-sni: www.google.com
      default-fingerprint: chrome
      flow: xtls-rprx-vision
      network-type: tcp

    qr-code:
      enabled: true
      size: 512
      format: PNG

    selection:
      weights:
        latency: 0.30
        load: 0.20
        geography: 0.25
        health: 0.15
        protocol: 0.10

service:
  security:
    internal-secret: ${INTERNAL_SECRET:Internal_Secret_Vpn_App_2024_!@#}
    internal-check-enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  level:
    root: INFO
    com.vpn.config: DEBUG
    org.springframework.cloud.openfeign: DEBUG
    io.github.resilience4j: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"