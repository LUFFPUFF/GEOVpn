server:
  port: ${VPN_CONFIG_PORT}

spring:
  application:
    name: vpn-config-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: jdbc:postgresql://${PRODUCTION_DB_HOST}:${PRODUCTION_DB_PORT}/${PRODUCTION_DB_NAME}
    username: ${PRODUCTION_DB_USER}
    password: ${PRODUCTION_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      pool-name: VpnConfigHikariCP

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO}
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    validate-on-migrate: true


  data:
    redis:
      host: ${PRODUCTION_REDIS_HOST}
      port: ${PRODUCTION_REDIS_PORT:}
      password: ${PRODUCTION_REDIS_PASSWORD}
      timeout: 2000ms


  cache:
    type: redis
    redis:
      time-to-live: ${CACHE_TTL}


feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 10000
        loggerLevel: basic
      server-management-service:
        url: ${SERVER_MANAGEMENT_URL}


resilience4j:
  circuitbreaker:
    instances:
      serverManagement:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true

  retry:
    instances:
      serverManagement:
        max-attempts: 3
        wait-duration: 1s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2


vpn:
  config:
    vless:
      default-sni: www.google.com
      default-fingerprint: chrome
      flow: xtls-rprx-vision
      network-type: tcp

    qr-code:
      enabled: true
      size: 512
      format: PNG

    selection:
      weights:
        latency: 0.30      # 30% - Скорость отклика
        load: 0.20         # 20% - Загрузка сервера
        geography: 0.25    # 25% - Географическая близость
        health: 0.15       # 15% - Состояние сервера
        protocol: 0.10     # 10% - Поддержка протокола

        # Географические бонусы по странам
      geography-bonus:
        default:
          LV: 25  # Latvia - ближайшая
          FI: 20  # Finland - очень близко
          NL: 15  # Netherlands - хорошее соединение
          DE: 12  # Germany
          PL: 10  # Poland
          EE: 18  # Estonia
          SE: 17  # Sweden

        # Для европейских пользователей
        EU:
          NL: 25  # Netherlands - центр Европы
          DE: 23  # Germany
          FR: 20  # France
          UK: 18  # United Kingdom
          PL: 15  # Poland

        # Для азиатских пользователей
        ASIA:
          SG: 25  # Singapore
          JP: 23  # Japan
          HK: 20  # Hong Kong
          KR: 18  # South Korea

    latency:
      multiplier: 0.5
      max-acceptable-ms: 200
      excellent-threshold: 20
      good-threshold: 50


    load:
      critical-threshold: 90.0
      warning-threshold: 70.0
      optimal-threshold: 50.0

service:
  security:
    internal-secret: ${INTERNAL_SECRET}
    admin-token: YRqDAzgXLn29n/LcBnYYu7tQzgYEEikl0X5TYHrrwyiWgo+lBtlaJSD5MGp2j3YLB9u/xZu3jgK+540nyvpESA==
    admins: ${ADMIN_USER_IDS}

mock:
  server-management:
    enabled: ${MOCK_ENABLED}

management:
  endpoints:
    web:
      exposure:
        include: ${MONITORING_ENDPOINTS}
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  level:
    root: INFO
    com.vpn.config: DEBUG
    org.springframework.cloud.openfeign: DEBUG
    io.github.resilience4j: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"