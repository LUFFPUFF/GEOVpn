syntax = "proto3";

package v2ray.core.app.stats.command;

option java_package = "com.vpn.server.grpc.generated";
option java_multiple_files = true;
option java_outer_classname = "XrayStatsProto";

service StatsService {
  rpc GetStats (GetStatsRequest) returns (GetStatsResponse) {}

  rpc QueryStats (QueryStatsRequest) returns (QueryStatsResponse) {}

  rpc GetSysStats (SysStatsRequest) returns (SysStatsResponse) {}
}

service HandlerService {
  rpc AddClient (AddClientRequest) returns (AddClientResponse) {}
  rpc RemoveClient (RemoveClientRequest) returns (RemoveClientResponse) {}
}


message Stat {
  string name = 1;
  int64 value = 2;
}

message GetStatsRequest {
  string name = 1;
  bool reset = 2;
}

message GetStatsResponse {
  Stat stat = 1;
}

message QueryStatsRequest {
  string pattern = 1;
  bool reset = 2;
}

message QueryStatsResponse {
  repeated Stat stat = 1;
}

message AddClientRequest {
  string inbound_tag = 1;
  string client_json = 2;
}
message AddClientResponse {}

message RemoveClientRequest {
  string inbound_tag = 1;
  string email = 2;
}
message RemoveClientResponse {}

message SysStatsRequest {}

message SysStatsResponse {
  uint32 NumGoroutine = 1;
  uint32 NumOMallocs = 2;
  uint32 NumFrees = 3;
  uint32 Alloc = 4;
  uint32 TotalAlloc = 5;
  uint32 Sys = 6;
  uint32 Mallocs = 7;
  uint32 Frees = 8;
  uint32 LiveObjects = 9;
  uint32 PauseTotalNs = 10;
  uint32 NumGC = 11;
  uint32 NumForcedGC = 12;
  uint64 Uptime = 13;
}