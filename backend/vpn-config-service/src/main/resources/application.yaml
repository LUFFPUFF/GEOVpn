server:
  port: ${VPN_CONFIG_PORT}

spring:
  application:
    name: vpn-config-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:prod}

  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${POSTGRES_DB}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      pool-name: VpnConfigHikariCP

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO}
    show-sql: ${SHOW_SQL}
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: ${FLYWAY_ENABLED}
    baseline-on-migrate: true
    locations: classpath:db/migration

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      timeout: 2000ms

  cache:
    type: redis
    redis:
      time-to-live: ${CACHE_TTL}

feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 10000
      server-management-service:
        url: ${SERVER_MGM_SERVICE_URL}

resilience4j:
  circuitbreaker:
    instances:
      serverManagement:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
  retry:
    instances:
      serverManagement:
        max-attempts: 3
        wait-duration: 1s

vpn:
  relay:
    ru:
      ip: ${VPN_RELAY_IP}
    panel:
      url: ${VPN_RELAY_PANEL_URL}
      username: ${VPN_RELAY_USER}
      password: ${VPN_RELAY_PASS}
      inbound-id: ${VPN_RELAY_INBOUND_ID}
  panel:
    url: ${VPN_MAIN_PANEL_URL}
    username: ${VPN_MAIN_PANEL_USER}
    password: ${VPN_MAIN_PANEL_PASS}
    inbound-id: ${VPN_MAIN_INBOUND_ID}

  config:
    vless:
      default-sni: "www.microsoft.com"
      default-fingerprint: "chrome"
      flow: "xtls-rprx-vision"
      network-type: "tcp"
      relay-server-address: "http://${VPN_RELAY_IP}:2053/"
      relay-server-port: 443

    hysteria2:
      enabled: true
      port: ${HY2_PORT}
      password: ${HY2_PASS}
      sni: ${HY2_SNI}
      obfs:
        type: salamander
        password: ""
      tls:
        insecure: true

    qr-code:
      enabled: true
      size: 512
      format: PNG

    selection:
      weights:
        latency: 0.30
        load: 0.20
        geography: 0.25
        health: 0.15
        protocol: 0.10
      geography-bonus:
        default:
          LV: 25
          FI: 20
          NL: 15
          DE: 12
          PL: 10
          EE: 18
          SE: 17
        EU:
          NL: 25
          DE: 23
          FR: 20
          UK: 18
          PL: 15
        ASIA:
          SG: 25
          JP: 23
          HK: 20
          KR: 18

    latency:
      multiplier: 0.5
      max-acceptable-ms: 200

service:
  security:
    internal-secret: ${INTERNAL_SECRET}
    admin-token: ${ADMIN_TOKEN}
    admins: ${ADMIN_USER_IDS}

mock:
  server-management:
    enabled: ${MOCK_ENABLED}

management:
  endpoints:
    web:
      exposure:
        include: ${MONITORING_ENDPOINTS}

logging:
  level:
    root: INFO
    com.vpn.config: INFO