server:
  port: 8081

spring:
  application:
    name: user-service-geo

  datasource:
    url: jdbc:postgresql://localhost:5433/vpn_db
    username: admin
    password: admin
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

logging:
  level:
    org.flywaydb: INFO
    org.springframework.jdbc.core: DEBUG
