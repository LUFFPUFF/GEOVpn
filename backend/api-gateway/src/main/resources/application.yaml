server:
  port: 8080

spring:
  application:
    name:  api-gateway

  cloud:
    gateway:

      default-filters:
        - AuthenticationFilter
        - name: RequestRateLimiter
          args:
            redis-rate-limiter.replenishRate: 10
            redis-rate-limiter.burstCapacity: 20
            redis-rate-limiter.requestedTokens: 1
            key-resolver: "#{@userKeyResolver}"
        - SecureHeaders
        - AddRequestHeader=X-Internal-Secret, ${app.security.internal-secret}

      httpclient:
        connect-timeout: 5000
        response-timeout: 10s

      # todo хардкор маршрутизаторов (заменить на docker образы)
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000"
              - "https://your-mini-app-domain.com"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            exposedHeaders:
              - "X-Trace-Id"
            allowCredentials: true
            maxAge: 3600


      # todo хардкор маршрутизаторов (заменить на docker образы)
      routes:
        - id: user-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/users/**, /api/v1/devices/**

        - id: vpn-config-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/configs/**

        - id: server-management-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/servers/**

        - id: billing-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/v1/billing/**

management:
  endpoints:
    web:
      exposure:
        include: health, metrics, gateway
  endpoint:
    health:
      show-details: always

