server:
  port: ${SERVER_MGM_PORT}

spring:
  application:
    name: server-management-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: jdbc:postgresql://${PRODUCTION_DB_HOST}:${PRODUCTION_DB_PORT}/${PRODUCTION_DB_NAME}
    username: ${PRODUCTION_DB_USER}
    password: ${PRODUCTION_DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  quartz:
    job-store-type: memory


service:
  security:
    internal-secret: ${INTERNAL_SECRET}
    internal-check-enabled: ${INTERNAL_CHECK_ENABLED}
    admins: ${ADMIN_USER_IDS}
    admin-token: YRqDAzgXLn29n/LcBnYYu7tQzgYEEikl0X5TYHrrwyiWgo+lBtlaJSD5MGp2j3YLB9u/xZu3jgK+540nyvpESA==

vpn:
  monitoring:
    health-check-interval-ms: ${VPN_HEALTH_CHECK_MS}
    timeout-ms: ${VPN_TIMEOUT_MS}
    xray-grpc-port: ${XRAY_GRPC_PORT}

  billing:
    collect-interval-ms: 300000 # Интервал сбора трафика (5 минут)
    price-per-gb: 600
    low-traffic-alert-mb: 500

feign:
  client:
    config:
      user-service:
        url: http://localhost:8082


management:
  endpoints:
    web:
      exposure:
        include: ${MONITORING_ENDPOINTS}
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}