server:
  port: ${SERVER_MGM_PORT}

spring:
  application:
    name: server-management-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:prod}

  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${POSTGRES_DB}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  quartz:
    job-store-type: memory

service:
  security:
    internal-secret: ${INTERNAL_SECRET}
    internal-check-enabled: ${INTERNAL_CHECK_ENABLED}
    admins: ${ADMIN_USER_IDS}
    admin-token: ${ADMIN_TOKEN}

vpn:
  monitoring:
    health-check-interval-ms: ${VPN_HEALTH_CHECK_MS}
    timeout-ms: ${VPN_TIMEOUT_MS}
    xray-grpc-port: ${XRAY_GRPC_PORT}

  billing:
    collect-interval-ms: 300000
    price-per-gb: 600
    low-traffic-alert-mb: 500

feign:
  client:
    config:
      user-service:
        url: ${USER_SERVICE_URL}

management:
  endpoints:
    web:
      exposure:
        include: ${MONITORING_ENDPOINTS}
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  level:
    root: INFO
    com.vpn.servermanagement: INFO